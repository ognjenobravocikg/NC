<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Match Count</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      h1 {
        font-size: 1.6rem;
        margin-bottom: 8px;
        color: #ffffff;
      }
      p.subtitle {
        font-size: 0.9rem;
        color: #888;
        margin-bottom: 32px;
      }

      .main-layout {
        display: flex;
        gap: 24px;
        width: 100%;
        max-width: 1600px;
        align-items: flex-start;
      }

      .chart-wrapper {
        background: #1a1d27;
        border-radius: 16px;
        padding: 32px;
        flex: 1;
        min-width: 0;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      canvas {
        width: 100% !important;
      }

      .panel {
        background: #1a1d27;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        flex-shrink: 0;
      }

      .panel h2 {
        font-size: 1rem;
        color: #ffffff;
        margin-bottom: 4px;
      }
      .panel .hint {
        font-size: 0.78rem;
        color: #555;
        margin-bottom: 20px;
      }

      .breakdown-panel {
        width: 260px;
        height: 700px;
      }

      .date-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 24px;
        max-height: 220px;
        overflow-y: auto;
      }

      .date-btn {
        background: #23263a;
        border: 1px solid #2e3150;
        border-radius: 8px;
        color: #aaa;
        padding: 8px 12px;
        font-size: 0.85rem;
        cursor: pointer;
        text-align: left;
        transition: all 0.15s;
      }

      .date-btn:hover {
        background: #2a2f4a;
        color: #fff;
      }

      .date-btn.active {
        background: #2e3a6e;
        border-color: #4fc3f7;
        color: #4fc3f7;
        font-weight: 600;
      }

      .breakdown-title {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .breakdown-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .breakdown-table th {
        color: #555;
        text-align: left;
        padding: 4px 8px;
        border-bottom: 1px solid #2a2d3a;
        font-weight: 500;
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      .breakdown-table td {
        padding: 7px 8px;
        border-bottom: 1px solid #1e2130;
        color: #ddd;
      }

      .breakdown-table tr:last-child td {
        border-bottom: none;
      }

      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 40%;
        margin-right: 4px;
      }

      .no-data {
        color: #444;
        font-size: 0.85rem;
        margin-top: 12px;
      }

      .matches-panel {
        width: 360px;
        display: flex;
        flex-direction: column;
        max-height: 700px;
      }

      .matches-panel .panel-header {
        margin-bottom: 16px;
        flex-shrink: 0;
      }

      .matches-panel .panel-header h2 {
        margin-bottom: 4px;
      }

      .matches-scroll {
        overflow-y: auto;
        flex: 1;
      }

      /* Match cards */
      .match-card {
        background: #23263a;
        border: 1px solid #2e3150;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
        font-size: 0.83rem;
        line-height: 1.6;
      }

      .match-card:last-child {
        margin-bottom: 0;
      }

      .match-time {
        font-size: 0.73rem;
        color: #555;
        font-family: monospace;
        margin-bottom: 4px;
      }

      .match-map {
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 0.85rem;
      }

      .match-players {
        color: #bbb;
        margin-bottom: 6px;
      }

      .match-players .player-name {
        color: #fff;
        font-weight: 500;
      }
      .match-players .vs {
        color: #333;
        margin: 0 6px;
      }

      .match-duration {
        font-size: 0.75rem;
        color: #555;
      }

      .matches-placeholder {
        color: #333;
        font-size: 0.85rem;
        text-align: center;
        padding: 32px 0;
      }

      .error {
        color: #ff6b6b;
        margin-top: 20px;
        font-size: 0.95rem;
      }
      .loading {
        color: #888;
        margin-top: 20px;
        font-size: 0.95rem;
      }
    </style>
  </head>

  <body>
    <div style="position: absolute; top: 20px; left: 20px">
      <a href="/" style="color: #888; text-decoration: none">← Home</a>
    </div>

    <h1>Map Match Count</h1>

    <div class="main-layout">
      <!-- LEFT: BREAKDOWN PANEL -->
      <div class="panel breakdown-panel">
        <h2>Daily Breakdown</h2>
        <p class="hint">Select a date to inspect</p>

        <div class="date-list" id="dateList"></div>

        <div id="breakdownSection" style="display: none">
          <p class="breakdown-title" id="breakdownTitle"></p>
          <table class="breakdown-table">
            <thead>
              <tr>
                <th>Map</th>
                <th>Matches</th>
                <th>Avg Time</th>
              </tr>
            </thead>
            <tbody id="breakdownBody"></tbody>
          </table>
        </div>

        <p class="no-data" id="noData" style="display: none">
          No matches on this date.
        </p>
      </div>

      <div class="chart-wrapper">
        <canvas id="matchChart"></canvas>
      </div>

      <div class="panel matches-panel">
        <div class="panel-header">
          <h2>Match Log</h2>
          <p class="hint" id="matchesHint">Select a date to see matches</p>
        </div>
        <div style="margin-bottom: 20px">
          <label style="color: #888; font-size: 0.85rem">Filter by map:</label>
          <select
            id="mapFilter"
            style="
              margin-left: 10px;
              padding: 6px 10px;
              background: #1a1d27;
              color: #fff;
              border: 1px solid #2e3150;
              border-radius: 6px;
            "
          >
            <option value="">All maps</option>
          </select>
        </div>
        <div class="matches-scroll" id="matchesScroll">
          <p class="matches-placeholder">No date selected</p>
        </div>
      </div>
    </div>

    <p id="status" class="loading">Loading data...</p>

    <script>
      const API_BASE = "http://localhost:8000";
      const MAP_NAMES = ["Lake", "Cobblestone", "Inferno", "Desert", "Forest"];
      const COLORS = [
        "#4fc3f7",
        "#81c784",
        "#ffb74d",
        "#f06292",
        "#ce93d8",
        "#80cbc4",
      ];

      const MAP_COLOR = {};
      MAP_NAMES.forEach((n, i) => {
        MAP_COLOR[n] = COLORS[i % COLORS.length];
      });

      let allData = {};
      let chartDates = [];

      function formatDuration(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
      }

      async function fetchAvailableDates() {
        const res = await fetch(`${API_BASE}/map-stats/Forest`);
        if (!res.ok) throw new Error("Failed to fetch dates");
        const data = await res.json();
        return data.map((r) => r.date).sort();
      }

      function initMapFilter() {
        const select = document.getElementById("mapFilter");

        MAP_NAMES.forEach((name) => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });

        select.addEventListener("change", () => {
          const activeBtn = document.querySelector(".date-btn.active");
          if (activeBtn) {
            showBreakdown(activeBtn.dataset.date);
          }
        });
      }

      async function fetchMatchesForDate(dateStr) {
        const mapFilter = document.getElementById("mapFilter").value;

        let url = `${API_BASE}/matches/${dateStr}`;

        if (mapFilter) {
          url += `?map_name=${encodeURIComponent(mapFilter)}`;
        }

        const res = await fetch(url);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        return await res.json();
      }

      async function renderMatchLog(dateStr) {
        const scroll = document.getElementById("matchesScroll");
        const hint = document.getElementById("matchesHint");

        hint.textContent = dateStr;
        scroll.innerHTML = '<p class="matches-placeholder">Loading...</p>';

        try {
          const matches = await fetchMatchesForDate(dateStr);

          if (!matches.length) {
            scroll.innerHTML =
              '<p class="matches-placeholder">No matches found.</p>';
            return;
          }

          scroll.innerHTML = matches
            .map((m) => {
              const color = MAP_COLOR[m.map] ?? "#aaa";
              return `
              <div class="match-card">
                <div class="match-time">🕐 ${m.datetime_utc} UTC</div>
                <div class="match-map" style="color:${color}">■ ${m.map}</div>
                <div class="match-players">
                  <span class="player-name">${m.player}</span>
                  <span class="vs">vs</span>
                  <span class="player-name">${m.opponent}</span>
                </div>
                <div class="match-duration">⏱ ${formatDuration(m.duration_seconds)}</div>
              </div>
            `;
            })
            .join("");
        } catch (err) {
          scroll.innerHTML = `<p class="matches-placeholder" style="color:#ff6b6b">Failed to load matches.</p>`;
          console.error(err);
        }
      }

      function showBreakdown(dateStr) {
        document.querySelectorAll(".date-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.date === dateStr);
        });

        const tbody = document.getElementById("breakdownBody");
        const section = document.getElementById("breakdownSection");
        const noData = document.getElementById("noData");
        const title = document.getElementById("breakdownTitle");

        tbody.innerHTML = "";
        let totalMatches = 0;

        MAP_NAMES.forEach((name, i) => {
          const row = allData[name]?.[dateStr];
          const cnt = row?.match_cnt ?? 0;
          totalMatches += cnt;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><span class="dot" style="background:${COLORS[i % COLORS.length]}"></span>${name}</td>
            <td>${cnt}</td>
            <td>${row?.avg_playtime != null ? row.avg_playtime + "s" : "—"}</td>
          `;
          tbody.appendChild(tr);
        });

        title.textContent = `${dateStr} · ${totalMatches} total match${totalMatches !== 1 ? "es" : ""}`;

        if (totalMatches === 0) {
          section.style.display = "none";
          noData.style.display = "block";
        } else {
          section.style.display = "block";
          noData.style.display = "none";
        }

        renderMatchLog(dateStr);
      }

      function buildDateList(dates) {
        const container = document.getElementById("dateList");
        container.innerHTML = "";

        dates.forEach((dateStr) => {
          const btn = document.createElement("button");
          btn.className = "date-btn";
          btn.textContent = dateStr;
          btn.dataset.date = dateStr;
          btn.addEventListener("click", () => showBreakdown(dateStr));
          container.appendChild(btn);
        });
      }

      async function buildChart() {
        const status = document.getElementById("status");

        try {
          chartDates = await fetchAvailableDates();
          if (!chartDates.length) {
            status.textContent = "No data available.";
            return;
          }

          const dateFrom = chartDates[0];
          const dateTo = chartDates[chartDates.length - 1];

          const fetched = await Promise.all(
            MAP_NAMES.map((name) =>
              fetch(
                `${API_BASE}/map-stats/${name}?date_from=${dateFrom}&date_to=${dateTo}`,
              )
                .then((r) => {
                  if (!r.ok) throw new Error(`Failed ${name}`);
                  return r.json();
                })
                .then((rows) => ({ name, rows })),
            ),
          );

          fetched.forEach(({ name, rows }) => {
            allData[name] = {};
            rows.forEach((r) => {
              allData[name][r.date] = r;
            });
          });

          const datasets = fetched.map(({ name }, i) => ({
            label: name,
            data: chartDates.map((d) => allData[name][d]?.match_cnt ?? 0),
            borderColor: COLORS[i % COLORS.length],
            backgroundColor: COLORS[i % COLORS.length] + "22",
            borderWidth: 2.5,
            pointRadius: 4,
            tension: 0.3,
            fill: false,
          }));

          status.textContent = "";

          const ctx = document.getElementById("matchChart").getContext("2d");

          new Chart(ctx, {
            type: "line",
            data: { labels: chartDates, datasets },
            options: {
              responsive: true,
              interaction: { mode: "index", intersect: false },
              // Clicking a point on the chart also triggers both panels
              onClick(_, elements) {
                if (elements.length)
                  showBreakdown(chartDates[elements[0].index]);
              },
              plugins: {
                legend: { labels: { color: "#cccccc" } },
              },
              scales: {
                x: { ticks: { color: "#888" }, grid: { color: "#2a2d3a" } },
                y: {
                  beginAtZero: true,
                  ticks: { color: "#888", stepSize: 1, precision: 0 },
                  grid: { color: "#2a2d3a" },
                },
              },
            },
          });

          buildDateList(chartDates);

          if (chartDates.length)
            showBreakdown(chartDates[chartDates.length - 1]);
        } catch (err) {
          status.className = "error";
          status.textContent = "Error loading data.";
          console.error(err);
        }
      }

      initMapFilter();
      buildChart();
    </script>
  </body>
</html>
