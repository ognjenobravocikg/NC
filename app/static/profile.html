<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player Profile</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      a.back {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #888;
        text-decoration: none;
        font-size: 0.9rem;
      }

      a.back:hover {
        color: #fff;
      }

      h1 {
        font-size: 1.6rem;
        color: #fff;
        margin-bottom: 8px;
      }

      p.subtitle {
        color: #555;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }

      /* --- SEARCH --- */
      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 36px;
        width: 100%;
        max-width: 560px;
      }

      .search-bar input {
        flex: 1;
        background: #1a1d27;
        border: 1px solid #2e3150;
        border-radius: 10px;
        color: #e0e0e0;
        font-size: 0.95rem;
        padding: 12px 16px;
        outline: none;
        transition: border-color 0.2s;
      }

      .search-bar input:focus {
        border-color: #4fc3f7;
      }

      .search-bar input::placeholder {
        color: #444;
      }

      .search-bar button {
        background: #2e3a6e;
        border: none;
        border-radius: 10px;
        color: #4fc3f7;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 12px 22px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .search-bar button:hover {
        background: #3a4a8e;
      }

      /* --- CONTENT AREA --- */
      .content {
        width: 100%;
        max-width: 860px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* --- PROFILE CARD --- */
      .profile-card {
        background: #1a1d27;
        border-radius: 16px;
        padding: 28px 32px;
        display: flex;
        align-items: center;
        gap: 28px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .profile-info h2 {
        font-size: 1.4rem;
        color: #fff;
        margin-bottom: 4px;
      }

      .profile-info .meta {
        font-size: 0.85rem;
        color: #666;
      }

      .profile-info .meta span {
        margin-right: 16px;
      }

      /* --- STAT GRID --- */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      .stat-card {
        background: #1a1d27;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .stat-card .label {
        font-size: 0.75rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .stat-card .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
      }

      .stat-card .value.highlight {
        color: #4fc3f7;
      }
      .stat-card .value.green {
        color: #81c784;
      }

      .section-title {
        font-size: 1rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: -8px;
      }

      .match-table-wrapper {
        background: #1a1d27;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }

      thead th {
        color: #555;
        text-align: left;
        padding: 8px 12px;
        border-bottom: 1px solid #2a2d3a;
        font-weight: 500;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      tbody tr {
        border-bottom: 1px solid #1e2130;
        transition: background 0.15s;
      }

      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #1e2235;
      }

      tbody td {
        padding: 11px 12px;
        color: #ccc;
      }

      .outcome-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 600;
      }

      .outcome-win {
        background: #1b3a2a;
        color: #81c784;
      }
      .outcome-loss {
        background: #3a1b1b;
        color: #f06292;
      }
      .outcome-draw {
        background: #2a2a1b;
        color: #ffb74d;
      }

      .status-msg {
        text-align: center;
        padding: 20px;
        color: #555;
        font-size: 0.95rem;
      }

      .status-msg.error {
        color: #ff6b6b;
      }
    </style>
  </head>

  <body>
    <a class="back" href="/">← Home</a>

    <h1>Player Profile</h1>
    <p class="subtitle">
      Search for a player to view their stats and match history
    </p>

    <div class="search-bar">
      <input
        id="searchInput"
        type="text"
        placeholder="Enter username..."
        autocomplete="off"
      />
      <button onclick="search()">Search</button>
    </div>

    <div class="content" id="content"></div>

    <script>
      const API_BASE = "http://localhost:8000";

      document
        .getElementById("searchInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") search();
        });

      function outcomeLabel(outcome) {
        if (outcome === 1)
          return '<span class="outcome-badge outcome-win">Win</span>';
        if (outcome === 0)
          return '<span class="outcome-badge outcome-loss">Loss</span>';
        return '<span class="outcome-badge outcome-draw">Draw</span>';
      }

      function formatDuration(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
      }

      function renderProfile(data) {
        const content = document.getElementById("content");

        const winPct = (data.total_win_ratio * 100).toFixed(1);
        const bestMapPct = (data.best_map_ratio * 100).toFixed(1);

        content.innerHTML = `

          <!-- PROFILE CARD -->
          <div class="profile-card">
            <div class="profile-info">
              <h2>${data.username}</h2>
              <div class="meta">
                <span>${data.country ?? "Unknown"}</span>
                <span>Joined ${data.registration_date}</span>
                <span>${data.total_matches} matches</span>
              </div>
            </div>
          </div>

          <!-- STAT GRID -->
          <div class="stat-grid">
            <div class="stat-card">
              <span class="label">Total Matches</span>
              <span class="value">${data.total_matches}</span>
            </div>
            <div class="stat-card">
              <span class="label">Win Ratio</span>
              <span class="value ${data.total_win_ratio >= 0.5 ? "green" : ""}">${winPct}%</span>
            </div>
            <div class="stat-card">
              <span class="label">Best Map</span>
              <span class="value highlight" style="font-size:1.1rem">${data.best_map ?? "—"}</span>
            </div>
            <div class="stat-card">
              <span class="label">Best Map Win Rate</span>
              <span class="value green">${bestMapPct}%</span>
            </div>
          </div>

          <!-- MATCH HISTORY -->
          <p class="section-title">Match History</p>
          <div class="match-table-wrapper">
            ${
              data.match_history.length === 0
                ? '<p class="status-msg">No matches found.</p>'
                : `<table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Map</th>
                      <th>Opponent</th>
                      <th>Result</th>
                      <th>Duration</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${data.match_history
                      .map(
                        (m) => `
                      <tr>
                        <td>${m.date}</td>
                        <td>${m.map}</td>
                        <td>${m.opponent}</td>
                        <td>${outcomeLabel(m.outcome)}</td>
                        <td>${formatDuration(m.duration_seconds)}</td>
                      </tr>
                    `,
                      )
                      .join("")}
                  </tbody>
                </table>`
            }
          </div>
        `;
      }

      async function search() {
        const username = document.getElementById("searchInput").value.trim();
        if (!username) return;

        const content = document.getElementById("content");
        content.innerHTML = '<p class="status-msg">Loading...</p>';

        try {
          const res = await fetch(
            `${API_BASE}/player-stats/${encodeURIComponent(username)}`,
          );

          if (res.status === 404) {
            content.innerHTML = `<p class="status-msg error">Player "${username}" not found.</p>`;
            return;
          }

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          renderProfile(data);
        } catch (err) {
          content.innerHTML = `<p class="status-msg error">Error loading profile. Is the API running?</p>`;
          console.error(err);
        }
      }
    </script>
  </body>
</html>
